<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#00274C">
<meta name="description" content="Track local. Save local.">
<title>Time /T</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Time /T">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* Dark theme (default, on-brand U-M Blue) — applied when the user's system
     is dark, or when [data-theme="dark"] is set explicitly. Mirrors the
     configuration of bcruz22/expenses-tracker for a consistent product family. */
  :root, :root[data-theme="dark"] {
    --bg: #00274C;
    --surface: #0A3155;
    --surface-2: #123C63;
    --border: #1F4C74;
    --border-strong: #2A5A85;
    --text: #FFFFFF;
    --text-muted: #A9BFD4;
    --text-faint: #6E8AA8;
    --text-subtle: #6E8AA8;
    --accent: #FFCB05;
    --accent-text: #00274C;
    --accent-contrast: #00274C;
    --accent-strong: #00274C;
    --accent-soft: rgba(255, 203, 5, 0.18);
    --danger: #9A3324;
    --danger-soft: rgba(154, 51, 36, 0.22);
    --warning: #D86018;
    --warning-soft: rgba(216, 96, 24, 0.22);
    --success: #A5A508;
    --success-soft: rgba(165, 165, 8, 0.22);
    --toast-bg: #123C63;
    --scheme: dark;
    --cat-streaming: #00B2A9;
    --cat-software: #702082;
    --cat-utilities: #D86018;
    --cat-insurance: #2F65A7;
    --cat-fitness: #E01F7C;
    --cat-subscriptions: #A5A508;
    --cat-other: #989C97;
    --shadow: 0 1px 2px rgba(0,0,0,.20), 0 1px 3px rgba(0,0,0,.35);
    --shadow-lg: 0 10px 25px rgba(0,0,0,.35), 0 4px 10px rgba(0,0,0,.25);
    --radius: 10px;
    --radius-sm: 6px;
    --radius-lg: 12px;
    --mono: "IBM Plex Mono", ui-monospace, "SF Mono", "Monaco", "Cascadia Code", "Roboto Mono", "Consolas", monospace;
    --sans: "IBM Plex Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  /* Light theme — applied when the user's system is light AND they haven't
     manually forced dark, or when [data-theme="light"] is set. */
  @media (prefers-color-scheme: light) {
    :root:not([data-theme="dark"]) {
      --bg: #FFFFFF;
      --surface: #F5F7FA;
      --surface-2: #EBEFF5;
      --border: #D3DCE8;
      --border-strong: #BFC9D9;
      --text: #00274C;
      --text-muted: #5A6B85;
      --text-faint: #667289;
      --text-subtle: #667289;
      --accent-soft: rgba(255, 203, 5, 0.24);
      --danger-soft: rgba(154, 51, 36, 0.14);
      --warning-soft: rgba(216, 96, 24, 0.16);
      --success-soft: rgba(165, 165, 8, 0.20);
      --toast-bg: #00274C;
      --scheme: light;
      --shadow: 0 1px 2px rgba(0,39,76,.06), 0 1px 3px rgba(0,39,76,.08);
      --shadow-lg: 0 10px 25px rgba(0,39,76,.10), 0 4px 10px rgba(0,39,76,.08);
    }
  }
  :root[data-theme="light"] {
    --bg: #FFFFFF;
    --surface: #F5F7FA;
    --surface-2: #EBEFF5;
    --border: #D3DCE8;
    --border-strong: #BFC9D9;
    --text: #00274C;
    --text-muted: #5A6B85;
    --text-faint: #667289;
    --text-subtle: #667289;
    --accent-soft: rgba(255, 203, 5, 0.24);
    --danger-soft: rgba(154, 51, 36, 0.14);
    --warning-soft: rgba(216, 96, 24, 0.16);
    --success-soft: rgba(165, 165, 8, 0.20);
    --toast-bg: #00274C;
    --scheme: light;
    --shadow: 0 1px 2px rgba(0,39,76,.06), 0 1px 3px rgba(0,39,76,.08);
    --shadow-lg: 0 10px 25px rgba(0,39,76,.10), 0 4px 10px rgba(0,39,76,.08);
  }
  html { color-scheme: var(--scheme); }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); }
  button { font-family: inherit; font-size: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
  input, select, textarea { font-family: inherit; font-size: inherit; color: var(--text); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 10px; outline: none; transition: border-color .12s, box-shadow .12s; width: 100%; min-width: 0; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  textarea { resize: vertical; min-height: 60px; font-family: inherit; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Layout */
  #app { max-width: 1100px; margin: 0 auto; padding: 16px; }

  /* Header */
  .app-header { display: flex; align-items: center; gap: 16px; padding-bottom: 16px; margin-bottom: 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .brand { font-family: var(--mono); font-size: 22px; font-weight: 600; letter-spacing: -0.02em; display: flex; align-items: baseline; gap: 2px; }
  .brand-slash { color: var(--accent); }
  .brand-t { color: var(--accent); }
  .brand-tagline { font-size: 11px; font-family: var(--sans); font-weight: 400; color: var(--text-muted); letter-spacing: 0.02em; margin-left: 10px; white-space: nowrap; }
  .totals { display: flex; gap: 16px; flex: 1; flex-wrap: wrap; }
  .total-pill { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 12px; display: flex; flex-direction: column; gap: 2px; box-shadow: var(--shadow); }
  .total-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; }
  .total-value { font-family: var(--mono); font-size: 16px; font-weight: 600; color: var(--text); }
  .header-controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .icon-btn { width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center; border-radius: var(--radius-sm); color: var(--text-muted); transition: background .12s, color .12s; }
  .icon-btn:hover { background: var(--surface-2); color: var(--text); }
  .icon-btn svg { width: 18px; height: 18px; }
  .seg-toggle { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 3px; flex-shrink: 0; }
  .seg-toggle button { background: none; border: none; color: var(--text-faint); font-size: 11px; font-weight: 600; font-family: inherit; padding: 5px 10px; border-radius: 999px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.06em; transition: background .12s, color .12s; }
  .seg-toggle button:hover { color: var(--text); }
  .seg-toggle button.active { background: var(--accent); color: var(--accent-text); }
  .seg-toggle button.active:hover { color: var(--accent-text); }

  /* Sections */
  section { margin-bottom: 24px; }
  .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .section-header h2 { margin: 0; font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .section-actions { display: flex; gap: 8px; margin-left: auto; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 7px 12px; border-radius: var(--radius-sm); font-weight: 500; font-size: 13px; transition: background .12s, border-color .12s, color .12s; border: 1px solid transparent; }
  .btn-primary { background: var(--accent); color: var(--accent-contrast); }
  .btn-primary:hover { filter: brightness(1.08); }
  .btn-secondary { background: var(--surface); border-color: var(--border); color: var(--text); }
  .btn-secondary:hover { background: var(--surface-2); border-color: var(--border-strong); }
  .btn-danger { background: var(--surface); border-color: var(--border); color: var(--danger); }
  .btn-danger:hover { background: var(--danger-soft); border-color: var(--danger); }
  .btn-ghost { background: transparent; color: var(--text-muted); }
  .btn-ghost:hover { background: var(--surface-2); color: var(--text); }
  .btn-sm { padding: 4px 8px; font-size: 12px; }
  .btn-icon { padding: 6px; }
  .btn-icon svg { width: 15px; height: 15px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Timer cards */
  .timer-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 12px; }
  .timer-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px; box-shadow: var(--shadow); position: relative; display: flex; flex-direction: column; gap: 10px; transition: border-color .15s; min-width: 0; }
  .timer-card.running { border-color: var(--success); }
  .timer-card.paused { border-color: var(--warning); }
  .timer-card.completed { border-color: var(--accent); background: var(--surface-2); }
  .timer-card-top { display: flex; align-items: flex-start; gap: 10px; }
  .timer-card-fields { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; min-width: 0; }
  .timer-card-fields .field-full { grid-column: 1 / -1; }
  .timer-card-clock-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; min-width: 120px; }
  .timer-clock { font-family: var(--mono); font-size: 24px; font-weight: 600; letter-spacing: -0.02em; color: var(--text); font-variant-numeric: tabular-nums; }
  .timer-card.running .timer-clock { color: var(--success); }
  .timer-card.paused .timer-clock { color: var(--warning); }
  .timer-card.completed .timer-clock { color: var(--accent); }
  .timer-status-badge { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-subtle); }
  .running .status-dot { background: var(--success); animation: pulse 1.6s ease-in-out infinite; }
  .paused .status-dot { background: var(--warning); }
  .completed .status-dot { background: var(--accent); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .idle-warning-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--warning); margin-left: 4px; box-shadow: 0 0 0 3px var(--warning-soft); }
  .timer-notes { min-height: 44px; }
  .timer-card-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .timer-card-actions .btn { flex: 1; min-width: 0; }
  .field-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); font-weight: 500; margin-bottom: 2px; display: block; }
  .field-group { display: flex; flex-direction: column; min-width: 0; }
  .card-remove-btn { position: absolute; top: -8px; right: -8px; width: 22px; height: 22px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); box-shadow: var(--shadow); color: var(--text-muted); display: flex; align-items: center; justify-content: center; font-size: 16px; line-height: 1; z-index: 2; }
  .card-remove-btn:hover { background: var(--danger-soft); color: var(--danger); }

  /* Add timer button */
  .add-timer-card { background: transparent; border: 2px dashed var(--border); border-radius: var(--radius-lg); padding: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; color: var(--text-muted); min-height: 140px; transition: border-color .15s, color .15s, background .15s; }
  .add-timer-card:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  .add-timer-card:disabled:hover { border-color: var(--border); color: var(--text-muted); background: transparent; }

  /* Entry log */
  .ticket-group { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 10px; box-shadow: var(--shadow); overflow: hidden; }
  .ticket-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; background: var(--surface); transition: background .1s; }
  .ticket-header:hover { background: var(--surface-2); }
  .ticket-caret { color: var(--text-muted); transition: transform .15s; flex-shrink: 0; }
  .ticket-group.expanded .ticket-caret { transform: rotate(90deg); }
  .ticket-number { font-family: var(--mono); font-weight: 600; color: var(--text); flex-shrink: 0; }
  .ticket-client { color: var(--text-muted); font-size: 13px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ticket-status-wrap { position: relative; display: inline-flex; align-items: center; flex-shrink: 0; }
  .ticket-status-select {
    appearance: none; -webkit-appearance: none; -moz-appearance: none;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;
    padding: 3px 22px 3px 10px; border-radius: 10px; border: none; cursor: pointer;
    font-family: inherit; outline: none;
  }
  .ticket-status-select:focus { box-shadow: 0 0 0 2px var(--accent-soft); }
  .ticket-status-select.open { background: var(--success-soft); color: var(--success); }
  .ticket-status-select.waiting-customer { background: var(--warning-soft); color: var(--warning); }
  .ticket-status-select.waiting-internal { background: rgba(0, 178, 169, 0.20); color: var(--cat-streaming); }
  .ticket-status-select.closed { background: var(--surface-2); color: var(--text-muted); border: 1px solid var(--border); padding: 2px 21px 2px 9px; }
  .select-caret { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); pointer-events: none; opacity: 0.7; }
  .ticket-total { font-family: var(--mono); font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; flex-shrink: 0; }
  .ticket-header-actions { display: flex; gap: 4px; }
  .ticket-body { display: none; padding: 0 14px 12px; border-top: 1px solid var(--border); }
  .ticket-group.expanded .ticket-body { display: block; }
  .day-group { padding-top: 10px; }
  .day-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); font-weight: 600; margin-bottom: 6px; }
  .session-row { display: flex; align-items: flex-start; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .session-row:last-child { border-bottom: none; }
  .session-time { font-family: var(--mono); font-size: 12px; color: var(--text-muted); white-space: nowrap; min-width: 130px; font-variant-numeric: tabular-nums; }
  .session-duration { font-family: var(--mono); font-size: 12px; color: var(--text); font-weight: 500; margin-left: 4px; }
  .session-notes { flex: 1; color: var(--text); white-space: pre-wrap; word-break: break-word; font-size: 13px; }
  .session-notes.empty { color: var(--text-subtle); font-style: italic; }
  .session-actions { display: flex; gap: 4px; flex-shrink: 0; }

  /* Closed section */
  .closed-section { margin-top: 20px; }
  .closed-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; color: var(--text-muted); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .closed-header:hover { background: var(--surface); }
  .closed-body { display: none; margin-top: 10px; }
  .closed-section.expanded .closed-body { display: block; }
  .closed-section .ticket-caret { transition: transform .15s; }
  .closed-section.expanded .ticket-caret { transform: rotate(90deg); }
  .closed-count { margin-left: auto; }

  /* Empty state */
  .empty-state { text-align: center; padding: 32px 16px; color: var(--text-muted); font-size: 13px; background: var(--surface); border: 1px dashed var(--border); border-radius: var(--radius-lg); }

  /* Modal */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 16px; overflow-y: auto; }
  .modal { background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); max-width: 520px; width: 100%; max-height: 90vh; overflow-y: auto; }
  .modal-header { display: flex; align-items: center; padding: 16px; border-bottom: 1px solid var(--border); }
  .modal-title { font-size: 15px; font-weight: 600; margin: 0; flex: 1; }
  .modal-close { color: var(--text-muted); }
  .modal-body { padding: 16px; }
  .modal-footer { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); justify-content: flex-end; flex-wrap: wrap; }
  .modal-section { margin-bottom: 16px; }
  .modal-section:last-child { margin-bottom: 0; }
  .modal-section h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin: 0 0 8px; font-weight: 600; }
  .settings-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; }
  .settings-row label { flex: 1; font-size: 13px; }
  .settings-row .settings-control { flex-shrink: 0; }

  /* Form */
  .form-row { margin-bottom: 12px; }
  .form-row label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); font-weight: 500; margin-bottom: 4px; }
  .form-row input, .form-row select, .form-row textarea { width: 100%; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Toast */
  #toast-container { position: fixed; bottom: 16px; right: 16px; z-index: 200; display: flex; flex-direction: column; gap: 8px; max-width: 380px; pointer-events: none; }
  .toast { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; box-shadow: var(--shadow-lg); pointer-events: auto; animation: slideIn .2s ease-out; display: flex; flex-direction: column; gap: 8px; }
  .toast.warning { border-left: 3px solid var(--warning); }
  .toast.success { border-left: 3px solid var(--success); }
  .toast.error { border-left: 3px solid var(--danger); }
  .toast-title { font-weight: 600; font-size: 13px; }
  .toast-body { font-size: 13px; color: var(--text-muted); }
  .toast-actions { display: flex; gap: 6px; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* Update banner */
  .update-banner { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--accent-contrast); padding: 10px 16px; border-radius: var(--radius); box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 10px; z-index: 150; font-size: 13px; font-weight: 500; }

  /* Password strength meter */
  .password-strength { margin-top: 8px; }
  .password-strength-bar { height: 4px; background: var(--surface-2); border-radius: 2px; overflow: hidden; }
  .password-strength-fill { height: 100%; transition: width .2s, background .2s; }
  .password-strength-fill.weak { background: var(--danger); width: 25%; }
  .password-strength-fill.fair { background: var(--warning); width: 50%; }
  .password-strength-fill.good { background: #eab308; width: 75%; }
  .password-strength-fill.strong { background: var(--success); width: 100%; }
  .password-requirements { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
  .password-requirements ul { margin: 4px 0 0; padding-left: 16px; }
  .password-requirements li.met { color: var(--success); }
  .password-requirements li.met::marker { color: var(--success); }

  /* Compact mode */
  html[data-compact="on"] .timer-card { padding: 10px; gap: 6px; }
  html[data-compact="on"] .field-label { display: none; }
  html[data-compact="on"] .timer-clock { font-size: 18px; }
  html[data-compact="on"] .timer-card-clock-wrap { min-width: 90px; }
  html[data-compact="on"] .timer-notes { min-height: 28px; }
  html[data-compact="on"] .timer-card-fields { gap: 6px; }
  html[data-compact="on"] .totals { gap: 8px; }
  html[data-compact="on"] .total-pill { padding: 5px 8px; }
  html[data-compact="on"] .total-value { font-size: 13px; }
  html[data-compact="on"] .total-label { font-size: 10px; }
  html[data-compact="on"] .session-row { padding: 5px 0; }
  html[data-compact="on"] .day-group { padding-top: 6px; }
  html[data-compact="on"] .day-label { margin-bottom: 4px; }
  html[data-compact="on"] .ticket-header { padding: 8px 10px; }
  html[data-compact="on"] .ticket-body { padding: 0 10px 8px; }
  html[data-compact="on"] .session-notes { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
  html[data-compact="on"] .session-notes.expanded { white-space: pre-wrap; overflow: visible; text-overflow: unset; }
  html[data-compact="on"] .session-time { min-width: 100px; font-size: 11px; }
  html[data-compact="on"] .brand { font-size: 18px; }
  html[data-compact="on"] .brand-tagline { display: none; }
  html[data-compact="on"] .btn { padding: 5px 10px; }
  html[data-compact="on"] .app-header { padding-bottom: 10px; margin-bottom: 10px; }

  /* Responsive */
  @media (max-width: 640px) {
    #app { padding: 12px; }
    .app-header { gap: 10px; }
    .totals { width: 100%; order: 3; }
    .header-controls { margin-left: auto; }
    .timer-cards { grid-template-columns: 1fr; }
    .timer-card-fields { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .modal-backdrop { padding: 8px; align-items: flex-start; padding-top: 24px; }
  }

  /* Utility */
  .hidden { display: none !important; }
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
</style>
</head>
<body>
<div id="update-banner" class="update-banner hidden">
  New version available
  <button class="btn btn-sm" id="reload-btn" style="background: var(--accent-text); color: var(--accent);">Reload</button>
</div>

<div id="app">
  <header class="app-header">
    <div class="brand">Time<span class="brand-slash">/</span><span class="brand-t">T</span><span class="brand-tagline">Track local. Save local.</span></div>
    <div class="totals" id="totals"></div>

        <button type="button" data-compact-choice="off" title="Always full">Full</button>
      </div>
      <button class="icon-btn" id="settings-btn" title="Settings" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>

  <section id="timers-section">

    <div id="empty-log" class="empty-state hidden">No completed entries yet. Start a timer above to begin.</div>
  </section>
</div>

<datalist id="client-suggestions"></datalist>

<div id="modal-root"></div>
<div id="toast-container"></div>

<script>
/* =====================================================================
   Time /T  -  Track local. Save local.
   Single-file app. All state in localStorage. No servers.
   ===================================================================== */

const APP_VERSION = "0.1.0";
const APP_NAME = "Time /T";
const MAX_TIMERS = 10;
const HEARTBEAT_MS = 10_000;
const TICK_MS = 500;
const CRASH_RECOVERY_THRESHOLD_MS = 30 * 60 * 1000;
const PBKDF2_ITERATIONS = 250_000;

const K = {
  entries: "timetrack.entries",
  activeTimers: "timetrack.activeTimers",
  settings: "timetrack.settings",
  autocomplete: "timetrack.autocomplete",
  ticketStatuses: "timetrack.ticketStatuses",
  lastVersion: "timetrack.lastVersion",
};

const DEFAULT_SETTINGS = {
  theme: "auto",             // "auto" | "light" | "dark"
  compactMode: "auto",       // "auto" | "on" | "off"
  idleThresholdMinutes: 60,
  weekStartDay: 1,           // 0 = Sunday, 1 = Monday
};

const STATUS_OPTIONS = ["Open", "Waiting on Customer", "Waiting on Internal", "Closed"];

// =====================================================================
// State
// =====================================================================
let state = {
  entries: [],
  activeTimers: [],
  settings: {...DEFAULT_SETTINGS},
  autocompleteClients: [],
  ticketStatuses: {}, // ticketNumber -> status. Status is a ticket-level property, not per-session.
  expandedTickets: new Set(),
  closedExpanded: false,
  idleAcknowledged: {}, // timerId -> bool
};

// =====================================================================
// Storage
// =====================================================================
function loadState() {
  try {
    const entries = JSON.parse(localStorage.getItem(K.entries) || "[]");
    const activeTimers = JSON.parse(localStorage.getItem(K.activeTimers) || "[]");
    const settings = {...DEFAULT_SETTINGS, ...JSON.parse(localStorage.getItem(K.settings) || "{}")};
    const autocomplete = JSON.parse(localStorage.getItem(K.autocomplete) || "{}");
    const ticketStatuses = JSON.parse(localStorage.getItem(K.ticketStatuses) || "{}");
    state.entries = Array.isArray(entries) ? entries : [];
    state.activeTimers = Array.isArray(activeTimers) ? activeTimers : [];
    state.settings = settings;
    state.autocompleteClients = Array.isArray(autocomplete.clients) ? autocomplete.clients : [];
    state.ticketStatuses = (ticketStatuses && typeof ticketStatuses === "object") ? ticketStatuses : {};
  } catch (e) {
    console.error("Load failed:", e);
  }
}

function safeSetItem(key, value, label) {
  try {
    localStorage.setItem(key, value);
    return true;
  } catch (e) {
    console.error(`Save failed (${label}):`, e);
    toast({title: "Save failed", body: `Could not save ${label}. Storage may be full or blocked in this browser.`, className: "error", timeout: 6000});
    return false;
  }
}
function saveEntries() { safeSetItem(K.entries, JSON.stringify(state.entries), "entries"); }
function saveActiveTimers() { safeSetItem(K.activeTimers, JSON.stringify(state.activeTimers), "timers"); }
function saveSettings() { safeSetItem(K.settings, JSON.stringify(state.settings), "settings"); }
function saveAutocomplete() { safeSetItem(K.autocomplete, JSON.stringify({clients: state.autocompleteClients}), "autocomplete history"); }
function saveTicketStatuses() { safeSetItem(K.ticketStatuses, JSON.stringify(state.ticketStatuses), "ticket statuses"); }
function saveAll() { saveEntries(); saveActiveTimers(); saveSettings(); saveAutocomplete(); saveTicketStatuses(); }

// Status is a ticket-level property (one status per Ticket #), independent of individual sessions.
function getTicketStatus(ticketNumber) {
  return state.ticketStatuses[ticketNumber] || "Open";
}
function setTicketStatus(ticketNumber, status) {
  state.ticketStatuses[ticketNumber] = status;
  saveTicketStatuses();
  render();
}
function ensureTicketStatusExists(ticketNumber) {
  if (!(ticketNumber in state.ticketStatuses)) {
    state.ticketStatuses[ticketNumber] = "Open";
    saveTicketStatuses();
  }
}

// =====================================================================
// Helpers
// =====================================================================
function uuid() {
  if (crypto.randomUUID) return crypto.randomUUID();
  return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === "x" ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function nowISO() { return new Date().toISOString(); }
function nowMs() { return Date.now(); }

function formatClock(seconds) {
  seconds = Math.max(0, Math.floor(seconds));
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

function formatDuration(seconds) {
  seconds = Math.max(0, Math.floor(seconds));
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  if (h === 0 && m === 0) return `${seconds}s`;
  if (h === 0) return `${m}m`;
  return `${h}h ${m}m`;
}

function formatTimeOfDay(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString([], {hour: "numeric", minute: "2-digit"});
}

function formatDateLabel(dateStr) {
  const today = new Date();
  const d = new Date(dateStr + "T00:00:00");
  const todayStr = ymd(today);
  const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
  const yesterdayStr = ymd(yesterday);
  if (dateStr === todayStr) return "Today";
  if (dateStr === yesterdayStr) return "Yesterday";
  return d.toLocaleDateString([], {weekday: "short", month: "short", day: "numeric"});
}

function ymd(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function statusClass(status) {
  const map = {
    "Open": "open",
    "Waiting on Customer": "waiting-customer",
    "Waiting on Internal": "waiting-internal",
    "Closed": "closed",
  };
  return map[status] || "open";
}

function escapeHTML(str) {
  if (str == null) return "";
  return String(str).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c]);
}

// =====================================================================
// Timer elapsed calculation
// =====================================================================
function calculateElapsed(timer) {
  const base = timer.accumulatedSeconds || 0;
  if (timer.state === "running" && timer.currentSegmentStart) {
    const segmentSec = (nowMs() - new Date(timer.currentSegmentStart).getTime()) / 1000;
    return base + Math.max(0, segmentSec);
  }
  return base;
}

// =====================================================================
// Timer actions
// =====================================================================
function createEmptyTimerObject() {
  return {
    id: uuid(),
    clientName: "",
    ticketNumber: "",
    notes: "",
    createdAt: nowISO(),
    state: "empty", // "empty" | "running" | "paused" | "completed"
    accumulatedSeconds: 0,
    currentSegmentStart: null,
    startedAt: null,  // ISO time of first start (for entry startTime)
    lastHeartbeat: nowISO(),
    savedEntryId: null, // set once stopped -> entry created
  };
}

function addTimer() {
  if (state.activeTimers.length >= MAX_TIMERS) {
    toast({title: "Timer limit reached", body: `You can have up to ${MAX_TIMERS} active timers at once.`});
    return;
  }
  state.activeTimers.push(createEmptyTimerObject());
  saveActiveTimers();
  render();
}

function removeTimer(id) {
  const t = state.activeTimers.find(x => x.id === id);
  if (!t) return;
  if (t.state === "running" || t.state === "paused") {
    if (!confirm("This timer is still active. Remove it and discard the session?")) return;
  }
  state.activeTimers = state.activeTimers.filter(x => x.id !== id);
  delete state.idleAcknowledged[id];
  saveActiveTimers();
  render();
}

function startTimer(id) {
  const t = state.activeTimers.find(x => x.id === id);
  if (!t) return;
  const now = nowISO();
  t.state = "running";
  t.currentSegmentStart = now;
  t.lastHeartbeat = now;
  if (!t.startedAt) t.startedAt = now;
  saveActiveTimers();
  render();
}

function pauseTimer(id) {
  const t = state.activeTimers.find(x => x.id === id);
  if (!t || t.state !== "running") return;
  const segmentSec = (nowMs() - new Date(t.currentSegmentStart).getTime()) / 1000;
  t.accumulatedSeconds = (t.accumulatedSeconds || 0) + Math.max(0, segmentSec);
  t.currentSegmentStart = null;
  t.state = "paused";
  t.lastHeartbeat = nowISO();
  saveActiveTimers();
  render();
}

function resumeTimer(id) {
  const t = state.activeTimers.find(x => x.id === id);
  if (!t || t.state !== "paused") return;
  t.state = "running";
  t.currentSegmentStart = nowISO();
  t.lastHeartbeat = nowISO();
  saveActiveTimers();
  render();
}

function stopTimer(id, options = {}) {
  const t = state.activeTimers.find(x => x.id === id);
  if (!t) return;
  // Seal current segment
  if (t.state === "running" && t.currentSegmentStart) {
    const segmentSec = (nowMs() - new Date(t.currentSegmentStart).getTime()) / 1000;
    t.accumulatedSeconds = (t.accumulatedSeconds || 0) + Math.max(0, segmentSec);
    t.currentSegmentStart = null;
  }
  // Validate required fields
  if (!options.skipValidation) {
    if (!t.clientName.trim() || !t.ticketNumber.trim()) {
      openIncompleteStopModal(t);
      return;
    }
  }
  // Create entry
  const entry = {
    id: t.savedEntryId || uuid(),
    ticketNumber: t.ticketNumber.trim(),
    clientName: t.clientName.trim(),
    notes: t.notes,
    startTime: t.startedAt,
    endTime: nowISO(),
    durationSeconds: Math.floor(t.accumulatedSeconds),
    createdAt: t.createdAt,
    updatedAt: nowISO(),
  };
  // Add or update
  const existingIdx = state.entries.findIndex(e => e.id === entry.id);
  if (existingIdx >= 0) state.entries[existingIdx] = entry;
  else state.entries.push(entry);
  // Ensure the ticket has a status record (defaults to Open on first session)
  ensureTicketStatusExists(entry.ticketNumber);
  // Update autocomplete
  if (entry.clientName && !state.autocompleteClients.includes(entry.clientName)) {
    state.autocompleteClients.push(entry.clientName);
    saveAutocomplete();
  }
  // Auto-expand the ticket group so tech sees the newly saved session
  state.expandedTickets.add(entry.ticketNumber);
  // Mark timer completed
  t.state = "completed";
  t.savedEntryId = entry.id;
  t.lastHeartbeat = nowISO();
  saveEntries();
  saveActiveTimers();
  delete state.idleAcknowledged[t.id];
  render();
}

function stopAllTimers() {
  const running = state.activeTimers.filter(t => t.state === "running" || t.state === "paused");
  if (running.length === 0) return;
  const incomplete = running.filter(t => !t.clientName.trim() || !t.ticketNumber.trim());
  if (incomplete.length > 0) {
    openStopAllIncompleteModal(running, incomplete);
    return;
  }
  running.forEach(t => stopTimer(t.id));
}

function startAgain(id) {
  // Turn completed timer into a fresh running one with same Client/Ticket
  const t = state.activeTimers.find(x => x.id === id);
  if (!t) return;
  const now = nowISO();
  t.state = "running";
  t.accumulatedSeconds = 0;
  t.currentSegmentStart = now;
  t.startedAt = now;
  t.notes = "";
  t.savedEntryId = null;
  t.createdAt = now;
  t.lastHeartbeat = now;
  saveActiveTimers();
  render();
}

function clearTimer(id) {
  const t = state.activeTimers.find(x => x.id === id);
  if (!t) return;
  t.clientName = "";
  t.ticketNumber = "";
  t.notes = "";
  t.state = "empty";
  t.accumulatedSeconds = 0;
  t.currentSegmentStart = null;
  t.startedAt = null;
  t.savedEntryId = null;
  t.lastHeartbeat = nowISO();
  t.createdAt = nowISO();
  saveActiveTimers();
  render();
}

function updateTimerField(id, field, value) {
  const t = state.activeTimers.find(x => x.id === id);
  if (!t) return;
  t[field] = value;
  t.lastHeartbeat = nowISO();
  saveActiveTimers();
  // No full re-render on typing; totals do not depend on active timer field values.
}

// =====================================================================
// Entry actions
// =====================================================================
function deleteEntry(id) {
  if (!confirm("Delete this entry? This cannot be undone.")) return;
  const entry = state.entries.find(e => e.id === id);
  state.entries = state.entries.filter(e => e.id !== id);
  // If that was the last session on this ticket, drop the orphaned ticket status
  if (entry && entry.ticketNumber && !state.entries.some(e => e.ticketNumber === entry.ticketNumber)) {
    delete state.ticketStatuses[entry.ticketNumber];
    saveTicketStatuses();
  }
  saveEntries();
  render();
}

function openEditEntry(id) {
  const entry = state.entries.find(e => e.id === id);
  if (!entry) return;
  openEditModal(entry);
}

function updateEntry(id, updates) {
  const entry = state.entries.find(e => e.id === id);
  if (!entry) return;
  Object.assign(entry, updates);
  // Recalculate duration from start/end
  if (updates.startTime || updates.endTime) {
    const startMs = new Date(entry.startTime).getTime();
    const endMs = new Date(entry.endTime).getTime();
    if (!isNaN(startMs) && !isNaN(endMs) && endMs >= startMs) {
      entry.durationSeconds = Math.floor((endMs - startMs) / 1000);
    }
  }
  entry.updatedAt = nowISO();
  // If reassigned to a ticket # that's never been seen, give it a default status
  if (updates.ticketNumber) ensureTicketStatusExists(entry.ticketNumber);
  // Update autocomplete
  if (entry.clientName && !state.autocompleteClients.includes(entry.clientName)) {
    state.autocompleteClients.push(entry.clientName);
    saveAutocomplete();
  }
  saveEntries();
  render();
}

// =====================================================================
// Grouping
// =====================================================================
function groupEntries() {
  const groups = {};
  for (const e of state.entries) {
    const key = e.ticketNumber || "(no ticket)";
    if (!groups[key]) groups[key] = {ticketNumber: key, sessions: [], totalSeconds: 0, latestUpdatedAt: e.updatedAt, clientName: e.clientName};
    groups[key].sessions.push(e);
    groups[key].totalSeconds += (e.durationSeconds || 0);
    if (new Date(e.updatedAt).getTime() > new Date(groups[key].latestUpdatedAt).getTime()) {
      groups[key].latestUpdatedAt = e.updatedAt;
      groups[key].clientName = e.clientName;
    }
  }
  const list = Object.values(groups);
  // Status is a ticket-level property, looked up independently of any session
  for (const g of list) g.status = getTicketStatus(g.ticketNumber);
  return list;
}

function groupSessionsByDay(sessions) {
  const days = {};
  for (const s of sessions) {
    const day = ymd(new Date(s.startTime));
    if (!days[day]) days[day] = [];
    days[day].push(s);
  }
  // Sort days desc, sessions within day asc by startTime
  const sorted = Object.keys(days).sort((a, b) => b.localeCompare(a));
  return sorted.map(day => ({
    day,
    sessions: days[day].sort((a, b) => new Date(a.startTime) - new Date(b.startTime)),
  }));
}

// =====================================================================
// Totals
// =====================================================================
function totalsForRanges() {
  const now = new Date();
  const todayStart = new Date(now); todayStart.setHours(0,0,0,0);
  const weekStart = getWeekStart(now);
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  let today = 0, week = 0, month = 0;
  for (const e of state.entries) {
    const start = new Date(e.startTime).getTime();
    const dur = e.durationSeconds || 0;
    if (start >= todayStart.getTime()) today += dur;
    if (start >= weekStart.getTime()) week += dur;
    if (start >= monthStart.getTime()) month += dur;
  }
  return {today, week, month};
}

function getWeekStart(date) {
  const d = new Date(date);
  const day = d.getDay(); // 0=Sun ... 6=Sat
  const weekStartDay = state.settings.weekStartDay;
  const diff = (day - weekStartDay + 7) % 7;
  d.setDate(d.getDate() - diff);
  d.setHours(0, 0, 0, 0);
  return d;
}

// =====================================================================
// Rendering
// =====================================================================
function render() {
  if (state.activeTimers.length === 0) {
    state.activeTimers.unshift(createEmptyTimerObject());
    saveActiveTimers();
  }
  renderTotals();
  renderTimers();
  renderLog();
  renderClientDatalist();
  renderStopAllButton();
}

function renderTotals() {
  const {today, week, month} = totalsForRanges();
  document.getElementById("totals").innerHTML = `
    <div class="total-pill"><span class="total-label">Today</span><span class="total-value">${formatDuration(today)}</span></div>
    <div class="total-pill"><span class="total-label">This Week</span><span class="total-value">${formatDuration(week)}</span></div>
    <div class="total-pill"><span class="total-label">This Month</span><span class="total-value">${formatDuration(month)}</span></div>
  `;
}

function renderTimers() {
  const container = document.getElementById("timer-cards");
  if (state.activeTimers.length === 0) return; // render() guarantees at least one; defensive no-op only
  container.innerHTML = "";
  for (const t of state.activeTimers) container.appendChild(timerCardEl(t));
  const addBtn = document.createElement("button");
  addBtn.className = "add-timer-card";
  addBtn.disabled = state.activeTimers.length >= MAX_TIMERS;
  addBtn.title = addBtn.disabled ? `Maximum ${MAX_TIMERS} timers` : "Add another timer";
  addBtn.innerHTML = `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    <span>Add timer${state.activeTimers.length >= MAX_TIMERS ? ` (max ${MAX_TIMERS})` : ""}</span>
  `;
  addBtn.onclick = () => addTimer();
  container.appendChild(addBtn);
}

function timerCardEl(t) {
  const card = document.createElement("div");
  card.className = `timer-card ${t.state === "empty" ? "" : t.state}`;
  card.dataset.timerId = t.id;
  const elapsed = calculateElapsed(t);
  const stateLabel = {empty: "Ready", running: "Running", paused: "Paused", completed: "Completed"}[t.state] || "Ready";
  const idleFlag = state.idleAcknowledged[t.id] && t.state === "running";

  const actionsHTML = renderTimerActions(t);

  card.innerHTML = `
    <button class="card-remove-btn" title="Remove timer" data-action="remove">×</button>
    <div class="timer-card-top">
      <div class="timer-card-fields">
        <div class="field-group">
          <label class="field-label">Client</label>
          <input type="text" list="client-suggestions" data-field="clientName" value="${escapeHTML(t.clientName)}" placeholder="Client name" ${t.state === "completed" ? "readonly" : ""}>
        </div>
        <div class="field-group">
          <label class="field-label">Ticket #</label>
          <input type="text" data-field="ticketNumber" value="${escapeHTML(t.ticketNumber)}" placeholder="Ticket number" ${t.state === "completed" ? "readonly" : ""}>
        </div>
      </div>
      <div class="timer-card-clock-wrap">
        <div class="timer-clock" data-clock>${formatClock(elapsed)}</div>
        <div class="timer-status-badge">
          <span class="status-dot"></span>
          ${stateLabel}
          ${idleFlag ? '<span class="idle-warning-dot" title="Idle warning acknowledged"></span>' : ""}
        </div>
      </div>
    </div>
    <div class="field-group">
      <label class="field-label">Notes</label>
      <textarea class="timer-notes" data-field="notes" placeholder="What are you working on?" ${t.state === "completed" ? "readonly" : ""}>${escapeHTML(t.notes)}</textarea>
    </div>
    <div class="timer-card-actions">${actionsHTML}</div>
  `;

  // Wire up inputs
  card.querySelectorAll("[data-field]").forEach(el => {
    el.addEventListener("input", () => updateTimerField(t.id, el.dataset.field, el.value));
    el.addEventListener("change", () => updateTimerField(t.id, el.dataset.field, el.value));
  });

  // Wire up buttons
  card.querySelectorAll("[data-action]").forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const action = btn.dataset.action;
      if (action === "remove") removeTimer(t.id);
      else if (action === "start") startTimer(t.id);
      else if (action === "pause") pauseTimer(t.id);
      else if (action === "resume") resumeTimer(t.id);
      else if (action === "stop") stopTimer(t.id);
      else if (action === "startAgain") startAgain(t.id);
      else if (action === "clear") clearTimer(t.id);
    };
  });

  return card;
}

function renderTimerActions(t) {
  if (t.state === "empty") {
    return `<button class="btn btn-primary" data-action="start">Start</button>`;
  }
  if (t.state === "running") {
    return `
      <button class="btn btn-secondary" data-action="pause">Pause</button>
      <button class="btn btn-primary" data-action="stop">Stop</button>
    `;
  }
  if (t.state === "paused") {
    return `
      <button class="btn btn-primary" data-action="resume">Resume</button>
      <button class="btn btn-secondary" data-action="stop">Stop</button>
    `;
  }
  if (t.state === "completed") {
    return `
      <button class="btn btn-primary" data-action="startAgain">Start Again</button>
      <button class="btn btn-secondary" data-action="clear">Clear</button>
    `;
  }
  return "";
}

function renderLog() {
  const container = document.getElementById("ticket-groups");
  const closedContainer = document.getElementById("closed-section-container");
  const empty = document.getElementById("empty-log");
  const groups = groupEntries();
  if (groups.length === 0) {
    container.innerHTML = "";
    closedContainer.innerHTML = "";
    empty.classList.remove("hidden");
    return;
  }
  empty.classList.add("hidden");
  // Split active vs closed
  const active = groups.filter(g => g.status !== "Closed");
  const closed = groups.filter(g => g.status === "Closed");
  // Sort: most recently updated first
  active.sort((a, b) => new Date(b.latestUpdatedAt) - new Date(a.latestUpdatedAt));
  closed.sort((a, b) => new Date(b.latestUpdatedAt) - new Date(a.latestUpdatedAt));

  container.innerHTML = "";
  for (const g of active) container.appendChild(ticketGroupEl(g));

  if (closed.length > 0) {
    closedContainer.innerHTML = "";
    const section = document.createElement("div");
    section.className = "closed-section" + (state.closedExpanded ? " expanded" : "");
    section.innerHTML = `
      <div class="closed-header" data-toggle-closed>
        <svg class="ticket-caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="9 18 15 12 9 6"/></svg>
        <span>Closed</span>
        <span class="closed-count">${closed.length} ${closed.length === 1 ? "ticket" : "tickets"} · ${formatDuration(closed.reduce((s,g)=>s+g.totalSeconds,0))}</span>
      </div>
      <div class="closed-body"></div>
    `;
    const body = section.querySelector(".closed-body");
    for (const g of closed) body.appendChild(ticketGroupEl(g));
    section.querySelector("[data-toggle-closed]").onclick = () => {
      state.closedExpanded = !state.closedExpanded;
      section.classList.toggle("expanded");
    };
    closedContainer.appendChild(section);
  } else {
    closedContainer.innerHTML = "";
  }
}

function ticketGroupEl(g) {
  const el = document.createElement("div");
  const expanded = state.expandedTickets.has(g.ticketNumber);
  el.className = "ticket-group" + (expanded ? " expanded" : "");
  const days = groupSessionsByDay(g.sessions);
  el.innerHTML = `
    <div class="ticket-header" data-toggle>
      <svg class="ticket-caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="9 18 15 12 9 6"/></svg>
      <span class="ticket-number">${escapeHTML(g.ticketNumber)}</span>
      <span class="ticket-client">${escapeHTML(g.clientName || "")}</span>
      <div class="ticket-status-wrap" data-status-wrap>
        <select class="ticket-status-select ${statusClass(g.status)}" data-status-select title="Ticket status">
          ${STATUS_OPTIONS.map(s => `<option value="${s}" ${g.status === s ? "selected" : ""}>${s}</option>`).join("")}
        </select>
        <svg class="select-caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="10" height="10"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <span class="ticket-total">${formatDuration(g.totalSeconds)}</span>
      <div class="ticket-header-actions">
        <button class="btn btn-ghost btn-sm btn-icon" title="Copy all notes" data-copy-group>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>
    </div>
    <div class="ticket-body"></div>
  `;
  const body = el.querySelector(".ticket-body");
  for (const d of days) {
    const dayGroup = document.createElement("div");
    dayGroup.className = "day-group";
    dayGroup.innerHTML = `<div class="day-label">${escapeHTML(formatDateLabel(d.day))}</div>`;
    for (const s of d.sessions) dayGroup.appendChild(sessionRowEl(s));
    body.appendChild(dayGroup);
  }
  el.querySelector("[data-toggle]").onclick = (e) => {
    if (e.target.closest("[data-copy-group]") || e.target.closest("[data-status-wrap]")) return;
    if (state.expandedTickets.has(g.ticketNumber)) state.expandedTickets.delete(g.ticketNumber);
    else state.expandedTickets.add(g.ticketNumber);
    el.classList.toggle("expanded");
  };
  el.querySelector("[data-status-select]").addEventListener("change", (e) => {
    e.stopPropagation();
    setTicketStatus(g.ticketNumber, e.target.value);
  });
  el.querySelector("[data-status-wrap]").addEventListener("click", (e) => e.stopPropagation());
  el.querySelector("[data-copy-group]").onclick = (e) => {
    e.stopPropagation();
    const combined = g.sessions
      .slice()
      .sort((a, b) => new Date(a.startTime) - new Date(b.startTime))
      .map(s => s.notes || "")
      .filter(s => s.trim() !== "")
      .join("\n\n");
    if (!combined) { toast({title: "No notes to copy", className: "warning"}); return; }
    copyToClipboard(combined);
  };
  return el;
}

}

function renderStopAllButton() {
  const btn = document.getElementById("stop-all-btn");
  const runningCount = state.activeTimers.filter(t => t.state === "running" || t.state === "paused").length;
  if (runningCount >= 2) btn.classList.remove("hidden");
  else btn.classList.add("hidden");

// =====================================================================
// Ticking — updates clock displays without full re-render
// =====================================================================
setInterval(() => {
  for (const t of state.activeTimers) {
    if (t.state !== "running") continue;
    const card = document.querySelector(`.timer-card[data-timer-id="${t.id}"]`);
    if (!card) continue;
    const clock = card.querySelector("[data-clock]");
    if (clock) clock.textContent = formatClock(calculateElapsed(t));
  }
}, TICK_MS);

// Heartbeat + idle check
setInterval(() => {
  const now = nowISO();
  let dirty = false;
  for (const t of state.activeTimers) {
    if (t.state === "running") {
      t.lastHeartbeat = now;
      dirty = true;
      // Idle warning check
      if (!state.idleAcknowledged[t.id]) {
        const elapsed = calculateElapsed(t);
        if (elapsed >= state.settings.idleThresholdMinutes * 60) {
          openIdleToast(t);
          state.idleAcknowledged[t.id] = "warned"; // prevent repeat toasts until acknowledged
        }
      }
    }
  }
  if (dirty) saveActiveTimers();
  // Every heartbeat also refresh totals in case an entry just ticked over a boundary
  renderTotals();
}, HEARTBEAT_MS);

// =====================================================================
// Idle warning
// =====================================================================
function openIdleToast(t) {
  const label = `${t.clientName || "(no client)"} · ${t.ticketNumber || "(no ticket)"}`;
  const id = "idle-" + t.id;
  toast({
    id,
    className: "warning",
    title: `Timer running for ${state.settings.idleThresholdMinutes} min`,
    body: label,
    actions: [
      {label: "Continue", onClick: () => { state.idleAcknowledged[t.id] = "acknowledged"; render(); }},
      {label: "Pause", onClick: () => { pauseTimer(t.id); state.idleAcknowledged[t.id] = "acknowledged"; }},
      {label: "Discard", onClick: () => { removeTimerNoConfirm(t.id); }, danger: true},
    ],
    persistent: true,
  });
}

function removeTimerNoConfirm(id) {
  state.activeTimers = state.activeTimers.filter(x => x.id !== id);
  delete state.idleAcknowledged[id];
  saveActiveTimers();
  render();
}

// =====================================================================
// Crash recovery
// =====================================================================
function checkCrashRecovery() {
  const now = nowMs();
  const stale = state.activeTimers.filter(t => t.state === "running" && (now - new Date(t.lastHeartbeat).getTime() > CRASH_RECOVERY_THRESHOLD_MS));
  if (stale.length === 0) return;
  openRecoveryModal(stale[0], stale);
}

function openRecoveryModal(t, allStale) {
  const lastHb = new Date(t.lastHeartbeat);
  const gapMs = nowMs() - lastHb.getTime();
  const gapMin = Math.floor(gapMs / 60000);
  const gapH = Math.floor(gapMin / 60);
  const gapText = gapH > 0 ? `${gapH}h ${gapMin % 60}m` : `${gapMin}m`;
  const segmentToHeartbeat = t.currentSegmentStart
    ? Math.max(0, (new Date(t.lastHeartbeat).getTime() - new Date(t.currentSegmentStart).getTime()) / 1000)
    : 0;
  const elapsedAtCrash = (t.accumulatedSeconds || 0) + segmentToHeartbeat;
  const modal = openModal({
    title: "Timer recovery",
    body: `
      <p style="margin-top:0;">Timer for <strong>${escapeHTML(t.clientName || "(no client)")}</strong> / <strong>${escapeHTML(t.ticketNumber || "(no ticket)")}</strong> was still running.</p>
      <p style="color: var(--text-muted);">Last active <strong>${gapText} ago</strong> at ${lastHb.toLocaleString([], {month: "short", day: "numeric", hour: "numeric", minute: "2-digit"})}.<br>Elapsed at last active: <strong>${formatDuration(elapsedAtCrash)}</strong></p>
      ${allStale.length > 1 ? `<p style="color: var(--text-muted); font-size: 12px;">${allStale.length - 1} more timer(s) also need recovery.</p>` : ""}
    `,
    footer: `
      <button class="btn btn-secondary" data-action="discard">Discard session</button>
      <button class="btn btn-secondary" data-action="cap">Cap at last active</button>
      <button class="btn btn-primary" data-action="continue">Continue from now</button>
    `,
    onAction: (action) => {
      if (action === "discard") {
        state.activeTimers = state.activeTimers.filter(x => x.id !== t.id);
        saveActiveTimers();
      } else if (action === "cap") {
        t.accumulatedSeconds = elapsedAtCrash;
        t.currentSegmentStart = null;
        t.state = "paused";
        stopTimer(t.id, {skipValidation: !t.clientName.trim() || !t.ticketNumber.trim() ? false : true});
        // If required fields missing, stopTimer opens the incomplete modal; otherwise entry is saved
      } else if (action === "continue") {
        // Pretend it's still running from now, adding the recovered elapsed time to accumulated
        t.accumulatedSeconds = elapsedAtCrash;
        t.currentSegmentStart = nowISO();
        t.lastHeartbeat = nowISO();
        t.state = "running";
        saveActiveTimers();
      }
      closeModal(modal);
      // If more stale timers, chain the next one
      const remaining = state.activeTimers.filter(x => x.state === "running" && (nowMs() - new Date(x.lastHeartbeat).getTime() > CRASH_RECOVERY_THRESHOLD_MS));
      if (remaining.length > 0) openRecoveryModal(remaining[0], remaining);
      else render();
    },
  });
}

// =====================================================================
// Incomplete-stop modal
// =====================================================================
function openIncompleteStopModal(t) {
  const modal = openModal({
    title: "Missing required fields",
    body: `
      <p style="margin-top:0;">This entry needs a <strong>Client Name</strong> and <strong>Ticket #</strong> before it can be saved.</p>
      <p style="color: var(--text-muted);">Fill them in, or discard the session (${formatDuration(t.accumulatedSeconds)}).</p>
    `,
    footer: `
      <button class="btn btn-danger" data-action="discard">Discard session</button>
      <button class="btn btn-primary" data-action="back">Go back</button>
    `,
    onAction: (action) => {
      if (action === "discard") {
        state.activeTimers = state.activeTimers.filter(x => x.id !== t.id);
        saveActiveTimers();
        render();
      } else {
        // Restore paused state so tech can fix and try again
        t.state = "paused";
        saveActiveTimers();
        render();
      }
      closeModal(modal);
    },
  });
}

function openStopAllIncompleteModal(running, incomplete) {
  const list = incomplete.map(t => `<li>${escapeHTML(t.clientName || "(no client)")} · ${escapeHTML(t.ticketNumber || "(no ticket)")} · ${formatDuration(calculateElapsed(t))}</li>`).join("");
  const modal = openModal({
    title: "Some timers are incomplete",
    body: `
      <p style="margin-top:0;">${incomplete.length} of ${running.length} timer(s) are missing Client or Ticket # and can't be saved as-is.</p>
      <ul style="color: var(--text-muted); font-size: 13px;">${list}</ul>
      <p>Stop the complete ones now and fix the rest, or cancel to fix everything first.</p>
    `,
    footer: `
      <button class="btn btn-secondary" data-action="cancel">Cancel</button>
      <button class="btn btn-primary" data-action="stopComplete">Stop complete timers only</button>
    `,
    onAction: (action) => {
      closeModal(modal);
      if (action === "stopComplete") {
        running.filter(t => t.clientName.trim() && t.ticketNumber.trim()).forEach(t => stopTimer(t.id));
      }
    },
  });
}

// =====================================================================
// Edit entry modal
// =====================================================================
function openEditModal(entry) {
  const modal = openModal({
    title: "Edit entry",
    body: `
      <div class="form-row">
        <label>Client</label>
        <input type="text" list="client-suggestions" id="edit-client" value="${escapeHTML(entry.clientName)}">
      </div>
      <div class="form-row">
        <label>Ticket #</label>
        <input type="text" id="edit-ticket" value="${escapeHTML(entry.ticketNumber)}">
      </div>
      <div class="form-grid">
        <div class="form-row">
          <label>Start</label>
          <input type="datetime-local" id="edit-start" value="${toLocalDatetimeInput(entry.startTime)}">
        </div>
        <div class="form-row">
          <label>End</label>
          <input type="datetime-local" id="edit-end" value="${toLocalDatetimeInput(entry.endTime)}">
        </div>
      </div>
      <div class="form-row">
        <label>Notes</label>
        <textarea id="edit-notes" rows="4">${escapeHTML(entry.notes)}</textarea>
      </div>
    `,
    footer: `
      <button class="btn btn-secondary" data-action="cancel">Cancel</button>
      <button class="btn btn-primary" data-action="save">Save</button>
    `,
    onAction: (action, root) => {
      if (action === "save") {
        const startVal = root.querySelector("#edit-start").value;
        const endVal = root.querySelector("#edit-end").value;
        const startDate = new Date(startVal);
        const endDate = new Date(endVal);
        if (!startVal || !endVal || isNaN(startDate.getTime()) || isNaN(endDate.getTime())) {
          alert("Start and End must both be valid dates and times.");
          return;
        }
        if (endDate < startDate) {
          alert("End time must be after start time.");
          return;
        }
        const updates = {
          clientName: root.querySelector("#edit-client").value.trim(),
          ticketNumber: root.querySelector("#edit-ticket").value.trim(),
          startTime: startDate.toISOString(),
          endTime: endDate.toISOString(),
          notes: root.querySelector("#edit-notes").value,
        };
        if (!updates.clientName || !updates.ticketNumber) {
          alert("Client Name and Ticket # are required.");
          return;
        }
        updateEntry(entry.id, updates);
      }
      closeModal(modal);
    },
  });
}

function toLocalDatetimeInput(iso) {
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

      </ul>`;

    title: "Client autocomplete history",
    body: list,
    footer: `<button class="btn btn-primary" data-action="close">Close</button>`,
    onAction: (action) => { if (action === "close") closeModal(modal); },

      state.autocompleteClients.splice(i, 1);

      openClientListModal();
