function confirmClearAll(onDone) {
  const modal = openModal({
    title: "Clear all data?",
    body: `<p style="margin-top:0;">This will permanently delete <strong>all entries, active timers, and autocomplete history</strong> from this device.</p>
      <p style="color: var(--danger);">This cannot be undone. Export a backup first if you want to keep the data.</p>`,
    footer: `
      <button class="btn btn-secondary" data-action="cancel">Cancel</button>
      <button class="btn btn-danger" data-action="confirm1">Yes, clear it</button>
    `,
    onAction: (action) => {
      closeModal(modal);
      if (action === "confirm1") confirmClearAllStage2(onDone);
      else if (onDone) onDone();
    },
  });
}

function confirmClearAllStage2(onDone) {
  const modal = openModal({
    title: "Are you absolutely sure?",
    body: `<p style="margin-top:0;">Last chance. Type <strong>DELETE</strong> to confirm.</p>
      <input type="text" id="confirm-input" placeholder="DELETE" style="width: 100%;">`,
    footer: `
      <button class="btn btn-secondary" data-action="cancel">Cancel</button>
      <button class="btn btn-danger" data-action="confirm2">Clear all data</button>
    `,
    onAction: (action, root) => {
      if (action === "confirm2") {
        if (root.querySelector("#confirm-input").value !== "DELETE") {
          alert("Type DELETE exactly to confirm.");
          return;
        }
        localStorage.removeItem(K.entries);
        localStorage.removeItem(K.activeTimers);
        localStorage.removeItem(K.autocomplete);
        localStorage.removeItem(K.ticketStatuses);
        state.entries = [];
        state.activeTimers = [];
        state.autocompleteClients = [];
        state.ticketStatuses = {};
        state.expandedTickets.clear();
        state.idleAcknowledged = {};
        render();
        toast({title: "All data cleared", className: "success"});
      }
      closeModal(modal);
      if (onDone) onDone();
    },
  });
}

// =====================================================================
// Encrypted export modal
// =====================================================================
function openEncryptedExportModal() {
  const modal = openModal({
    title: "Export encrypted backup",
    body: `
      <p style="margin-top:0; font-size: 13px;">Set a password to encrypt this backup. Uses AES-GCM with PBKDF2 (${PBKDF2_ITERATIONS.toLocaleString()} iterations, SHA-256).</p>
      <div class="form-row">
        <label>Password</label>
        <input type="password" id="enc-password" autocomplete="new-password" placeholder="Enter a strong password">
      </div>
      <div class="form-row">
        <label>Confirm password</label>
        <input type="password" id="enc-password-confirm" autocomplete="new-password" placeholder="Re-enter password">
      </div>
      <div class="password-strength">
        <div class="password-strength-bar"><div class="password-strength-fill" id="pw-fill"></div></div>
        <div class="password-requirements">
          Password requirements:
          <ul id="pw-reqs">
            <li data-req="length">At least 12 characters</li>
            <li data-req="upper">One uppercase letter</li>
            <li data-req="lower">One lowercase letter</li>
            <li data-req="digit">One number</li>
            <li data-req="special">One special character</li>
          </ul>
        </div>
      </div>
      <p style="color: var(--danger); font-size: 12px; margin-top: 12px;"><strong>Warning:</strong> If you lose this password, the backup cannot be recovered. There is no reset.</p>
    `,
    footer: `
      <button class="btn btn-secondary" data-action="cancel">Cancel</button>
      <button class="btn btn-primary" data-action="export" id="enc-export-btn" disabled>Export</button>
    `,
    onAction: async (action, root) => {
      if (action === "export") {
        const pw = root.querySelector("#enc-password").value;
        const pwc = root.querySelector("#enc-password-confirm").value;
        if (pw !== pwc) { alert("Passwords don't match."); return; }
        try {
          await exportEncryptedJSON(pw);
          closeModal(modal);
        } catch (e) {
          alert("Encryption failed: " + e.message);
        }
      } else {
        closeModal(modal);
      }
    },
  });
  const pwInput = modal.querySelector("#enc-password");
  const pwcInput = modal.querySelector("#enc-password-confirm");
  const exportBtn = modal.querySelector("#enc-export-btn");
  const evaluate = () => {
    const pw = pwInput.value;
    const reqs = evaluatePassword(pw);
    const met = Object.values(reqs).filter(Boolean).length;
    ["length","upper","lower","digit","special"].forEach(k => {
      const li = modal.querySelector(`[data-req="${k}"]`);
      if (li) li.classList.toggle("met", reqs[k]);
    });
    const fill = modal.querySelector("#pw-fill");
    fill.className = "password-strength-fill " + (met <= 1 ? "weak" : met <= 2 ? "fair" : met <= 3 ? "good" : "strong");
    const allMet = Object.values(reqs).every(Boolean);
    exportBtn.disabled = !(allMet && pw === pwcInput.value && pw.length > 0);
  };
  pwInput.addEventListener("input", evaluate);
  pwcInput.addEventListener("input", evaluate);
}

function evaluatePassword(pw) {
  return {
    length: pw.length >= 12,
    upper: /[A-Z]/.test(pw),
    lower: /[a-z]/.test(pw),
    digit: /[0-9]/.test(pw),
    special: /[^A-Za-z0-9]/.test(pw),
  };
}

// =====================================================================
// Import
// =====================================================================
function triggerImport() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".json,.csv,application/json,text/csv";
  input.onchange = async () => {
    const file = input.files[0];
    if (!file) return;
    const text = await file.text();
    if (file.name.toLowerCase().endsWith(".csv")) {
      importCSV(text);
    } else {
      // Try JSON
      try {
        const parsed = JSON.parse(text);
        if (parsed.encrypted) {
          const pw = prompt("Enter password to decrypt this backup:");
          if (!pw) return;
          try {
            const decrypted = await decrypt(parsed, pw);
            importJSON(JSON.parse(decrypted));
          } catch (e) {
            alert("Decryption failed. Wrong password?");
          }
        } else {
          importJSON(parsed);
        }
      } catch (e) {
        alert("Could not parse file: " + e.message);
      }
    }
  };
  input.click();
}

function importJSON(data) {
  if (!data || !Array.isArray(data.entries)) {
    alert("Invalid backup file: missing entries.");
    return;
  }
  let added = 0, updated = 0;
  const legacyStatusByTicket = {}; // for older backups where status lived on the entry
  for (const e of data.entries) {
    if (!e.id) e.id = uuid();
    // Legacy backups had a status field on the entry itself. Salvage it into the ticket map, then strip it from the entry.
    if (e.status && e.ticketNumber) {
      legacyStatusByTicket[e.ticketNumber] = e.status;
      delete e.status;
    }
    const existing = state.entries.find(x => x.id === e.id);
    if (existing) {
      if (new Date(e.updatedAt || 0) > new Date(existing.updatedAt || 0)) {
        Object.assign(existing, e);
        updated++;
      }
    } else {
      state.entries.push(e);
      added++;
    }
  }
  // Ticket-level statuses: explicit map wins, then salvaged legacy per-entry values, then default
  if (data.ticketStatuses && typeof data.ticketStatuses === "object") {
    Object.assign(state.ticketStatuses, data.ticketStatuses);
  }
  for (const [ticket, status] of Object.entries(legacyStatusByTicket)) {
    if (!(ticket in state.ticketStatuses)) state.ticketStatuses[ticket] = status;
  }
  // Backfill defaults for any imported ticket that still has no status
  for (const e of state.entries) {
    if (e.ticketNumber && !(e.ticketNumber in state.ticketStatuses)) {
      state.ticketStatuses[e.ticketNumber] = "Open";
    }
  }
  if (data.settings) state.settings = {...DEFAULT_SETTINGS, ...data.settings};
  if (data.autocompleteClients) {
    for (const c of data.autocompleteClients) {
      if (!state.autocompleteClients.includes(c)) state.autocompleteClients.push(c);
    }
  }
  saveAll();
  applyTheme(); applyCompactMode();
  render();
  toast({title: "Import complete", body: `${added} added, ${updated} updated`, className: "success"});
}

function importCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
  if (lines.length < 2) { alert("CSV appears empty."); return; }
  const headers = parseCSVLine(lines[0]).map(h => h.trim());
  const idx = {
    ticket: headers.indexOf("Ticket #"),
    client: headers.indexOf("Client Name"),
    status: headers.indexOf("Status"),
    start: headers.indexOf("Start Time"),
    end: headers.indexOf("End Time"),
    duration: headers.indexOf("Duration (seconds)"),
    notes: headers.indexOf("Notes"),
  };
  if (idx.start === -1 || idx.end === -1) {
    alert('This CSV is missing the expected "Start Time" / "End Time" columns, so it can\'t be imported. Use a CSV exported from Time /T.');
    return;
  }
  let added = 0, skipped = 0;
  for (let i = 1; i < lines.length; i++) {
    try {
      const cols = parseCSVLine(lines[i]);
      if (cols.length < 3) { skipped++; continue; }
      const startDate = new Date(cols[idx.start]);
      const endDate = new Date(cols[idx.end]);
      if (isNaN(startDate.getTime()) || isNaN(endDate.getTime())) { skipped++; continue; }
      const parsedDuration = idx.duration >= 0 ? parseInt(cols[idx.duration], 10) : NaN;
      const ticketNumber = (idx.ticket >= 0 ? cols[idx.ticket] : "") || "";
      const entry = {
        id: uuid(),
        ticketNumber,
        clientName: (idx.client >= 0 ? cols[idx.client] : "") || "",
        startTime: startDate.toISOString(),
        endTime: endDate.toISOString(),
        durationSeconds: !isNaN(parsedDuration) ? parsedDuration : Math.max(0, Math.floor((endDate - startDate) / 1000)),
        notes: (idx.notes >= 0 ? cols[idx.notes] : "") || "",
        createdAt: nowISO(),
        updatedAt: nowISO(),
      };
      state.entries.push(entry);
      added++;
      // Status column (if present) sets the ticket-level status; last row for a given ticket wins
      if (idx.status >= 0 && cols[idx.status] && ticketNumber) {
        state.ticketStatuses[ticketNumber] = cols[idx.status].trim() || "Open";
      } else if (ticketNumber) {
        ensureTicketStatusExists(ticketNumber);
      }
      if (entry.clientName && !state.autocompleteClients.includes(entry.clientName)) {
        state.autocompleteClients.push(entry.clientName);
      }
    } catch (e) {
      console.warn("Skipped CSV row", i, e);
      skipped++;
    }
  }
  saveEntries(); saveAutocomplete(); saveTicketStatuses();
  render();
  toast({
    title: "CSV import complete",
    body: `${added} entries added${skipped ? `, ${skipped} row(s) skipped (missing or invalid data)` : ""}`,
    className: skipped ? "warning" : "success",
    timeout: skipped ? 6000 : 3500,
  });
}

function parseCSVLine(line) {
  const out = [];
  let cur = "", inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQ) {
      if (c === '"' && line[i+1] === '"') { cur += '"'; i++; }
      else if (c === '"') inQ = false;
      else cur += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ",") { out.push(cur); cur = ""; }
      else cur += c;
    }
  }
  out.push(cur);
  return out;
}

// =====================================================================
// Export
// =====================================================================
function exportCSV() {
  const headers = ["Ticket #", "Client Name", "Status", "Start Time", "End Time", "Duration (seconds)", "Duration (formatted)", "Notes"];
  const rows = state.entries.map(e => [
    e.ticketNumber, e.clientName, getTicketStatus(e.ticketNumber),
    new Date(e.startTime).toISOString(),
    new Date(e.endTime).toISOString(),
    e.durationSeconds || 0,
    formatDuration(e.durationSeconds || 0),
    e.notes,
  ]);
  const csv = [headers, ...rows].map(row => row.map(csvEscape).join(",")).join("\n");
  downloadFile(csv, `time-tracker-${ymd(new Date())}.csv`, "text/csv");
}

function csvEscape(v) {
  if (v == null) return "";
  const s = String(v);
  if (/[",\n\r]/.test(s)) return `"${s.replace(/"/g, '""')}"`;
  return s;
}

function exportJSON() {
  const data = {
    version: APP_VERSION,
    exportedAt: nowISO(),
    entries: state.entries,
    ticketStatuses: state.ticketStatuses,
    settings: state.settings,
    autocompleteClients: state.autocompleteClients,
  };
  downloadFile(JSON.stringify(data, null, 2), `time-tracker-${ymd(new Date())}.json`, "application/json");
}

async function exportEncryptedJSON(password) {
  const data = {
    version: APP_VERSION,
    exportedAt: nowISO(),
    entries: state.entries,
    ticketStatuses: state.ticketStatuses,
    settings: state.settings,
    autocompleteClients: state.autocompleteClients,
  };
  const encrypted = await encrypt(JSON.stringify(data), password);
  downloadFile(JSON.stringify(encrypted, null, 2), `time-tracker-${ymd(new Date())}.enc.json`, "application/json");
  toast({title: "Encrypted backup exported", className: "success"});
}

function downloadFile(content, filename, mimeType) {
  const blob = new Blob([content], {type: mimeType});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// =====================================================================
// Encryption (AES-GCM + PBKDF2)
// =====================================================================
async function encrypt(plaintext, password) {
  const enc = new TextEncoder();
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name: "PBKDF2", salt, iterations: PBKDF2_ITERATIONS, hash: "SHA-256"},
    keyMaterial,
    {name: "AES-GCM", length: 256},
    false,
    ["encrypt"]
  );
  const ciphertext = await crypto.subtle.encrypt({name: "AES-GCM", iv}, key, enc.encode(plaintext));
  return {
    encrypted: true,
    algorithm: "AES-GCM",
    kdf: "PBKDF2",
    kdfHash: "SHA-256",
    iterations: PBKDF2_ITERATIONS,
    salt: bufToB64(salt),
    iv: bufToB64(iv),
    data: bufToB64(new Uint8Array(ciphertext)),
    version: APP_VERSION,
  };
}

async function decrypt(payload, password) {
  const enc = new TextEncoder();
  const salt = b64ToBuf(payload.salt);
  const iv = b64ToBuf(payload.iv);
  const data = b64ToBuf(payload.data);
  const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name: "PBKDF2", salt, iterations: payload.iterations || PBKDF2_ITERATIONS, hash: payload.kdfHash || "SHA-256"},
    keyMaterial,
    {name: "AES-GCM", length: 256},
    false,
    ["decrypt"]
  );
  const decrypted = await crypto.subtle.decrypt({name: "AES-GCM", iv}, key, data);
  return new TextDecoder().decode(decrypted);
}

function bufToB64(buf) {
  const bytes = new Uint8Array(buf);
  let bin = "";
  for (const b of bytes) bin += String.fromCharCode(b);
  return btoa(bin);
}

function b64ToBuf(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes.buffer;
}

// =====================================================================
// Copy to clipboard
// =====================================================================
async function copyToClipboard(text) {
  try {
    await navigator.clipboard.writeText(text);
    toast({title: "Copied to clipboard", className: "success"});
  } catch (e) {
    // Fallback
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); toast({title: "Copied", className: "success"}); }
    catch { toast({title: "Copy failed", className: "error"}); }
    document.body.removeChild(ta);
  }
}

// =====================================================================
// Modals
// =====================================================================
function openModal({title, body, footer, onAction}) {
  const root = document.createElement("div");
  root.className = "modal-backdrop";
  root.innerHTML = `
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 class="modal-title">${title}</h2>
        <button class="icon-btn modal-close" data-action="cancel" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="12" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">${body}</div>
      ${footer ? `<div class="modal-footer">${footer}</div>` : ""}
    </div>
  `;
  document.getElementById("modal-root").appendChild(root);
  root.addEventListener("click", (e) => {
    if (e.target === root) onAction && onAction("cancel", root.querySelector(".modal"));
  });
  root.querySelectorAll("[data-action]").forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      onAction && onAction(btn.dataset.action, root.querySelector(".modal"));
    };
  });
  const esc = (e) => { if (e.key === "Escape") { onAction && onAction("cancel", root.querySelector(".modal")); document.removeEventListener("keydown", esc); } };
  document.addEventListener("keydown", esc);
  return root;
}

function closeModal(modal) {
  if (modal && modal.parentNode) modal.parentNode.removeChild(modal);
}

// =====================================================================
// Toast
// =====================================================================
function toast({id, title, body, className, actions, persistent, timeout}) {
  const container = document.getElementById("toast-container");
  if (id) {
    const existing = container.querySelector(`[data-toast-id="${id}"]`);
    if (existing) existing.remove();
  }
  const el = document.createElement("div");
  el.className = "toast" + (className ? ` ${className}` : "");
  if (id) el.dataset.toastId = id;
  el.innerHTML = `
    ${title ? `<div class="toast-title">${escapeHTML(title)}</div>` : ""}
    ${body ? `<div class="toast-body">${escapeHTML(body)}</div>` : ""}
    ${actions ? `<div class="toast-actions">${actions.map((a, i) => `<button class="btn btn-sm ${a.danger ? "btn-danger" : "btn-secondary"}" data-i="${i}">${escapeHTML(a.label)}</button>`).join("")}</div>` : ""}
  `;
  container.appendChild(el);
  if (actions) {
    el.querySelectorAll("[data-i]").forEach(btn => {
      btn.onclick = () => { actions[parseInt(btn.dataset.i)].onClick(); el.remove(); };
    });
  }
  if (!persistent) {
    setTimeout(() => el.remove(), timeout || 3500);
  }
  return el;
}

// =====================================================================
// Theme + compact mode
// =====================================================================
// "auto" removes the data-theme attribute entirely, letting the CSS media
// query decide light vs dark. "light" and "dark" force the choice.
// Mirrors the expense tracker's pattern exactly.
function applyTheme() {
  const t = state.settings.theme; // "system" (was legacy name for auto), "light", "dark"
  const choice = (t === "system" || t === "auto") ? "auto" : t;
  if (choice === "auto") {
    document.documentElement.removeAttribute("data-theme");
  } else {
    document.documentElement.setAttribute("data-theme", choice);
  }
  // Reflect effective theme in the tab-color meta tag (nice on mobile)
  const effectiveDark = choice === "dark" || (choice === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
  document.querySelector('meta[name="theme-color"]').setAttribute("content", effectiveDark ? "#00274C" : "#FFFFFF");
  // Sync segmented control active state
  document.querySelectorAll("[data-theme-choice]").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.themeChoice === choice);
  });
}

function applyCompactMode() {
  const m = state.settings.compactMode;
  if (m === "auto") {
    document.documentElement.dataset.compact = window.innerWidth < 640 ? "on" : "off";
  } else {
    document.documentElement.dataset.compact = m;
  }
  // Sync segmented control active state
  document.querySelectorAll("[data-compact-choice]").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.compactChoice === m);
  });
}

function setTheme(choice) {
  state.settings.theme = choice; // "auto" | "light" | "dark"
  saveSettings();
  applyTheme();
}

function setCompactMode(choice) {
  state.settings.compactMode = choice; // "auto" | "on" | "off"
  saveSettings();
  applyCompactMode();
}

// =====================================================================
// Service worker registration + update banner
// =====================================================================
function registerSW() {
  if (!("serviceWorker" in navigator)) return;
  navigator.serviceWorker.register("sw.js").then(reg => {
    reg.addEventListener("updatefound", () => {
      const nw = reg.installing;
      if (!nw) return;
      nw.addEventListener("statechange", () => {
        if (nw.state === "installed" && navigator.serviceWorker.controller) {
          document.getElementById("update-banner").classList.remove("hidden");
        }
      });
    });
  }).catch(e => console.warn("SW registration failed:", e));
}

// =====================================================================
// Init
// =====================================================================
function init() {
  loadState();
  // Migrate legacy theme value from the icon-toggle era
  if (state.settings.theme === "system") { state.settings.theme = "auto"; saveSettings(); }
  applyTheme();
  applyCompactMode();

  // Header controls: segmented toggles + settings icon
  document.querySelectorAll("[data-theme-choice]").forEach(btn => {
    btn.addEventListener("click", () => setTheme(btn.dataset.themeChoice));
  });
  document.querySelectorAll("[data-compact-choice]").forEach(btn => {
    btn.addEventListener("click", () => setCompactMode(btn.dataset.compactChoice));
  });
  document.getElementById("settings-btn").onclick = openSettings;
  document.getElementById("reload-btn").onclick = () => location.reload();

  // System theme change listener — only matters when the user is in Auto
  matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
    if (state.settings.theme === "auto") applyTheme();
  });
  window.addEventListener("resize", () => {
    if (state.settings.compactMode === "auto") applyCompactMode();
  });

  // First-time: ensure at least one timer card
  if (state.activeTimers.length === 0) addTimer();
  else render();

  // Crash recovery check
  setTimeout(checkCrashRecovery, 500);

  // Save on page hide (extra insurance)
  window.addEventListener("visibilitychange", () => {
    if (document.hidden) saveAll();
  });

  registerSW();
}

document.addEventListener("DOMContentLoaded", init);
</script>
